name: Release

# Builds debproxy and debrepo (cmd/debtest is `//go:build ignore`, a dev
# script, not a real binary) for every pushed version tag and publishes them
# to the GitHub Releases page. Platforms match the existing Docker buildx
# matrix in the Makefile (linux/amd64, linux/arm64) -- this project ships as
# a server/proxy, not a general desktop CLI, so darwin/windows aren't built.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...
      # Excludes packages whose tests require a real Docker daemon to start a
      # Valkey container (see internal/testsupport, which shells out to the
      # docker CLI directly) -- ubuntu-slim runners don't have Docker
      # available, and those packages' TestMain fails the whole package's
      # test binary outright without it, not just the individual tests that
      # actually touch Valkey.
      - name: Test (excluding Docker-dependent packages)
        run: |
          pkgs=$(go list ./... | grep -v -E '^github\.com/debproxy/debproxy/(cmd/debproxy|internal/avail|internal/metadata/valkeystore|internal/server|internal/upstream|internal/valkeycache)$')
          go test $pkgs

  build:
    needs: test
    runs-on: ubuntu-slim
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          version="${GITHUB_REF_NAME}"
          go build -trimpath -ldflags="-s -w" -o "dist/debproxy_${version}_${GOOS}_${GOARCH}" ./cmd/debproxy
          go build -trimpath -ldflags="-s -w" -o "dist/debrepo_${version}_${GOOS}_${GOARCH}" ./cmd/debrepo
      - uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-slim
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS
      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
