apiVersion: apps/v1
kind: Deployment
metadata:
  name: debproxy
  namespace: debproxy
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: debproxy
  template:
    metadata:
      labels:
        app: debproxy
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      containers:
        - name: debproxy
          image: patrickdk/debproxy:latest
          args: ["serve", "--config", "/etc/debproxy/config.yaml"]
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9090
          resources:
            requests:
              cpu: 100m
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 7Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
          volumeMounts:
            - name: config
              mountPath: /etc/debproxy/config.yaml
              subPath: config.yaml
            - name: keys
              mountPath: /etc/debproxy/keys
              readOnly: true
            - name: signing
              mountPath: /etc/debproxy/signing
              readOnly: true
            - name: pool
              mountPath: /var/lib/debproxy
      volumes:
        - name: config
          configMap:
            name: debproxy-config
        - name: keys
          configMap:
            name: debproxy-keyrings
        - name: signing
          secret:
            secretName: debproxy-secret
        - name: pool
          persistentVolumeClaim:
            claimName: debproxy-pool
