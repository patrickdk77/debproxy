apiVersion: v1
kind: Secret
metadata:
  name: debproxy-secret
  namespace: debproxy
type: Opaque
stringData:
  # Private signing key only. Generate with:
  #   gpg --armor --export-secret-keys <your-key-id>
  debproxy-signing.asc: |
    -----BEGIN PGP PRIVATE KEY BLOCK-----
    REPLACE_ME
    -----END PGP PRIVATE KEY BLOCK-----
