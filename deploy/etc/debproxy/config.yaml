storage:
  backend: filesystem
  filesystem:
    root: /var/lib/debproxy

upstreams:
  debian-main:
    url: http://deb.debian.org/debian
    keys:
      - /etc/debproxy/keys/debian-archive-keyring.asc
    auto_update: false

  debian-security:
    url: http://security.debian.org/debian-security
    suite: "{codename}-security"
    keys:
      - /etc/debproxy/keys/debian-archive-keyring.asc
    auto_update: true

  ubuntu-main:
    url: http://archive.ubuntu.com/ubuntu
    keys:
      - /etc/debproxy/keys/ubuntu-archive-keyring.asc
    auto_update: false

  ubuntu-updates:
    url: http://archive.ubuntu.com/ubuntu
    suite: "{codename}-updates"
    keys:
      - /etc/debproxy/keys/ubuntu-archive-keyring.asc
    auto_update: true

  ubuntu-security:
    url: http://security.ubuntu.com/ubuntu
    suite: "{codename}-security"
    keys:
      - /etc/debproxy/keys/ubuntu-archive-keyring.asc
    auto_update: true

layouts:
  - os: debian
    architectures: [amd64, arm64]
    codenames:
      - codename: trixie
        components:
          - component: main
            upstreams: [debian-main, debian-security]
      - codename: bookworm
        components:
          - component: main
            upstreams: [debian-main, debian-security]

  - os: ubuntu
    architectures: [amd64, arm64]
    codenames:
      - codename: noble
        components:
          - component: main
            upstreams: [ubuntu-main, ubuntu-updates, ubuntu-security]
          - component: universe
            upstreams: [ubuntu-main, ubuntu-updates, ubuntu-security]
      - codename: jammy
        components:
          - component: main
            upstreams: [ubuntu-main, ubuntu-updates, ubuntu-security]

signing:
  private_key: /etc/debproxy/keys/debproxy-signing.asc
