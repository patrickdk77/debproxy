# user_agent sets the User-Agent sent to upstream mirrors. When omitted, the
# apt client's own User-Agent is passed through (e.g. 'Debian APT-HTTP/1.3 (2.8.3)').
# Set this if your mirrors require a specific UA or you want a fixed identity.
# user_agent: "Debian APT-HTTP/1.3 (2.8.3)"

# upstream_network forces upstream mirror fetches over a specific IP family:
# "ipv4" or "ipv6". Omit for the default dual-stack behavior (Happy Eyeballs
# races both, using whichever connects first). Set this if one family is
# broken in your network in a way that hangs rather than fails fast (a
# connect-time race alone doesn't reliably protect against that).
# upstream_network: "ipv4"

# metrics_addr is the listen address for the Prometheus /metrics endpoint.
# Leave commented out (or set to "") to disable metrics entirely.
# metrics_addr: ":9090"

schedule:
  # refresh controls how often the server re-fetches upstream package
  # indices in the background, keeping the live-path cache warm between requests.
  # Each os/codename layout refreshes on its own independent schedule (not a
  # single shared timer for all of them), so different layouts naturally
  # spread out over time instead of firing in one synchronized burst --
  # helpful in a multi-replica deployment, where a burst would mean every
  # replica hitting every upstream's fetch lock at the same few moments.
  # The first refresh for a given layout runs 2 minutes after startup, plus
  # up to 60s of shared startup jitter, plus that layout's own deterministic
  # offset spread across the refresh interval. Subsequent refreshes for that
  # layout run every interval plus refresh_jitter (below). Only one layout's
  # refresh+update cycle actually runs at a time even if two happen to want
  # to fire together, bounding peak memory the same way a single sequential
  # loop would.
  # Use a Go duration string (e.g. "6h", "12h", "24h"). Omit or set to "0" to disable.
  refresh: 6h

  # refresh_jitter is the maximum random delay added on top of refresh on
  # every cycle (each layout draws its own, independently). Omit for the
  # built-in default of 5 minutes; set to "0" to disable jitter entirely and
  # fire exactly every `refresh` interval.
  # refresh_jitter: 5m

  # controls when the server automatically publishes snapshots
  # while running in serve mode. Three formats are accepted:
  #   "daily@HH:MM"    every day at a fixed UTC time           e.g. "daily@03:00"
  #   "day@HH:MM"      every week on that day at a fixed time  e.g. "sunday@03:00"
  #   Go duration      every N hours with up to 5 min jitter   e.g. "24h"
  # Omit or set to "0" to disable  -- use `debproxy snapshot` to publish manually.
  snapshot: sunday@03:00

  # history and age together define the snapshot retention policy.
  # A snapshot is only deleted when BOTH limits are exceeded  -- it must be beyond the
  # count limit AND older than the age limit. This prevents deleting recent snapshots
  # even if you have accumulated many of them.
  #   history: 30   keep the 30 most-recent snapshots; excess + old ones are pruned
  #   age: "90d"    a snapshot must be older than 90 days to be eligible
  # Accepts a Go duration string for age; "d" suffix supported (e.g. "30d", "720h").
  history: 30
  age: 90d

  # cleanup controls when the server automatically prunes old snapshots and
  # runs pool GC while in serve mode.
  # Omit or set to "0" to disable  -- use `debproxy cleanup` to run manually.
  cleanup: "sunday@04:00"

  # snapshot_debounce is the minimum age the current snapshot must reach
  # before another one is published, whether triggered by the scheduler
  # above or by POST /api/v1/snapshot without {"force": true}. Omit for the
  # built-in default of 5 minutes; set to "0" to disable debouncing entirely.
  # snapshot_debounce: 5m

  # gc_grace is the minimum age a pool/src file must reach before pool/src GC
  # will delete it as unreferenced. This guards against a race between a
  # concurrent cache write and a GC pass building its "keep" set in between
  # the file being written and its metadata index entry committing.
  # Accepts a Go duration string (e.g. "30m", "2h"). Omit or set to "0" to use
  # the built-in default of 1 hour -- this is a safety margin, not a feature
  # to casually disable.
  # gc_grace: 1h

  # metadata_flush controls how often the server persists the metadata index
  # to the storage backend while running in serve mode. Accepts a Go duration
  # string (e.g. "5m", "1h"). Set to "0" to disable it entirely. Omit to use
  # a backend-dependent default: 5m normally (just flushes recently-dirty
  # keys, cheap), or 1h when valkey.enabled is true (pulls the ENTIRE current
  # index out of Valkey and writes it to storage in the same file format --
  # more expensive, and it's Valkey-backed metadata's only file-based backup,
  # since Valkey itself already has the data durably).
  # metadata_flush: 5m

signing:
  private_key: /etc/debproxy/keys/debproxy-signing.asc

storage:
  backend: filesystem   # filesystem | s3
  filesystem:
    root: /var/lib/debproxy
  # s3:
  #   bucket: my-debproxy-bucket
  #   region: us-east-1
  #   prefix: ""          # optional path prefix inside the bucket
  
  # compression controls what formats are used for Release/Packages files.
  # Set to false to disable a format, true to use the built-in default, or an
  # integer to select an explicit level.
  # Built-in defaults: snapshot gzip=9 zstd=11 xz=true; live gzip=3 zstd=3 xz=false.
  # compression:
  #   snapshot:
  #     gzip: true
  #     zstd: true
  #     xz: false
  #   live:
  #     gzip: false
  #     zstd: 3
  #     xz: false

  # file_cache is an OPTIONAL in-process LRU cache for pool/src file
  # downloads (the actual .deb/source-archive bytes clients pull through),
  # so repeat requests for a popular file don't re-fetch it from the
  # storage backend every time. Most valuable with storage.backend: s3,
  # where every miss is a real GetObject call; of little value against the
  # filesystem backend, which is already local.
  # file_cache:
  #   # size bounds total cached bytes. Accepts a plain byte count or a
  #   # number with a KB/MB/GB (binary, 1024-based) suffix -- e.g. "500MB",
  #   # "2GB", "1.5GB". A single file larger than 1/10th of this size is
  #   # never cached (streamed straight through instead), so one huge
  #   # package can't dominate or evict the whole cache. Omit or set to "0"
  #   # to disable the cache entirely (the default).
  #   size: "1GB"

# valkey configures an OPTIONAL shared Valkey/Redis deployment. When enabled,
# a cluster of debproxy replicas share the pool metadata index instead of
# each holding it fully in memory, and coordinate upstream fetches so only
# one replica fetches a given upstream at a time. Leave disabled (the
# default) for a single-replica deployment -- nothing else changes.
# valkey:
#   enabled: true
#   # Accepts redis:// or valkey:// (rediss:// / valkeys:// for TLS), repeated
#   # "?addr=host:port" for additional Cluster nodes, and "?master_set=name"
#   # for Sentinel. A "$VAR" segment anywhere in the URL (e.g. in the password)
#   # is expanded from the environment at load time.
#   url: "valkey://user:$VALKEY_PASSWORD@localhost:6379/0"
#   # key_prefix is prepended to every key debproxy writes, so a single Valkey
#   # deployment can safely be shared with other applications.
#   key_prefix: "debproxy:"

# api_job_queue_max bounds the async admin-operation job queue (update,
# cleanup, rebuild, prime -- see api: below). Omit for the built-in default
# of 1000, sized for bulk prime submissions (hundreds of packages at once).
# api_job_queue_max: 1000

# auth and api together configure debproxy's authenticated /api/v1 HTTP
# surface, letting CI/CD and other automation trigger admin actions in real
# time instead of only via CLI subcommand or the schedule: settings above.
# Leave both commented out to disable /api entirely -- every /api/v1 request
# then 404s (an unconfigured action is indistinguishable from a nonexistent
# one; see the design doc's request-flow section for why).
#
# auth:
#   # basic maps username -> password hash. Supported formats are
#   # auto-detected from their prefix: $2a$/$2b$/$2$ (bcrypt), $argon2id$,
#   # $6$ (sha512crypt), $5$ (sha256crypt). Generate with an operator tool
#   # (e.g. `htpasswd -B -C 12` for bcrypt, `mkpasswd -m sha-512`) -- this
#   # config never stores or accepts a plaintext password.
#   basic:
#     ci-bot: "$2b$12$replace-with-a-real-bcrypt-hash"
#   oidc:
#     # clock_tolerance_seconds/discovery_cooldown_seconds/cache_ttl_seconds/
#     # cache_max_entries all have built-in defaults (30/30/300/1000); only
#     # override if you have a specific reason to.
#     issuers:
#       # Example: GitHub Actions OIDC, restricted to one repository's
#       # workflows on its default branch.
#       - id: github-actions
#         issuer: https://token.actions.githubusercontent.com
#         audience: https://api.debproxy.example.com
#         # algorithms omitted -- resolved from OIDC discovery, filtered
#         # through the fixed safe ceiling (RS256/384/512, PS256/384/512,
#         # ES256/384/512, EdDSA; never HS*/none).
#         username_template: "{repository}"
#         group_templates: ["{repository_owner}"]
#         match_claim: repository
#         allow:
#           - "your-org/your-repo"
#
# api maps resource -> action -> the list of principal globs (Basic
# usernames and/or OIDC identity/group globs from username_template/
# group_templates above, matched case-insensitively) allowed to call it.
# Resource/action pairs not listed here 404 rather than 401/403 -- see above.
# api:
#   snapshot:
#     create: ["ci-bot", "github-actions"]  # POST /api/v1/snapshot
#     current: ["ci-bot", "github-actions"] # GET  /api/v1/snapshot/current
#   update:
#     run: ["admin-*"]                      # POST /api/v1/update
#   cleanup:
#     run: ["admin-*"]                      # POST /api/v1/cleanup
#   rebuild:
#     run: ["admin-*"]                      # POST /api/v1/rebuild
#   prime:
#     run: ["ci-bot", "github-actions"]      # POST /api/v1/prime
#   publish-key:
#     run: ["admin-*"]                      # POST /api/v1/publish-key
#   jobs:
#     read: ["ci-bot", "github-actions", "admin-*"] # GET /api/v1/jobs/{id}

upstreams:
  # --- Debian ---
  # deb.debian.org is a CDN that serves all architectures from one URL;
  # no per-architecture split needed.
  debian-main:
    url: http://deb.debian.org/debian
    keys:
      - /etc/debproxy/keys/debian-archive-keyring.gpg
    auto_update: false
  debian-security:
    url: http://security.debian.org/debian-security
    suite: "{codename}-security"
    keys:
      - /etc/debproxy/keys/debian-archive-keyring.gpg
    auto_update: true

  # --- Ubuntu (x86) ---
  # archive.ubuntu.com serves amd64 and i386.
  # arm64 and other ports architectures are NOT served here; they return 404.
  ubuntu-main:
    url: http://archive.ubuntu.com/ubuntu
    architectures: [amd64, i386]
    keys:
      - /etc/debproxy/keys/ubuntu-archive-keyring.gpg
    auto_update: false
  ubuntu-updates:
    url: http://archive.ubuntu.com/ubuntu
    suite: "{codename}-updates"
    architectures: [amd64, i386]
    keys:
      - /etc/debproxy/keys/ubuntu-archive-keyring.gpg
    auto_update: true
  ubuntu-security:
    url: http://security.ubuntu.com/ubuntu
    suite: "{codename}-security"
    architectures: [amd64, i386]
    keys:
      - /etc/debproxy/keys/ubuntu-archive-keyring.gpg
    auto_update: true

  # --- Ubuntu ports (arm64 and other non-x86 architectures) ---
  # ports.ubuntu.com serves arm64, armhf, ppc64el, riscv64, and s390x.
  # It mirrors the same suites ({codename}, {codename}-updates, {codename}-security)
  # but under a different hostname and path.
  ubuntu-ports-main:
    upstream_network: "ipv4"
    url: http://ports.ubuntu.com/ubuntu-ports
    architectures: [arm64]
    keys:
      - /etc/debproxy/keys/ubuntu-archive-keyring.gpg
    auto_update: false
  ubuntu-ports-updates:
    upstream_network: "ipv4"
    url: http://ports.ubuntu.com/ubuntu-ports
    suite: "{codename}-updates"
    architectures: [arm64]
    keys:
      - /etc/debproxy/keys/ubuntu-archive-keyring.gpg
    auto_update: true
  ubuntu-ports-security:
    upstream_network: "ipv4"
    url: http://ports.ubuntu.com/ubuntu-ports
    suite: "{codename}-security"
    architectures: [arm64]
    keys:
      - /etc/debproxy/keys/ubuntu-archive-keyring.gpg
    auto_update: true

  # --- Ubuntu ESM/Pro (requires Ubuntu Pro subscription) ---
  # esm.ubuntu.com requires HTTP Basic Auth. The token comes from your Ubuntu
  # Pro account (https://ubuntu.com/pro). Set UBUNTU_PRO_TOKEN in the
  # environment; the "$" prefix tells debproxy to expand it at startup.
  #
  # ESM keyrings ship with ubuntu-advantage-tools. Extract them from a host
  # that has the package installed:
  #   cp /usr/share/keyrings/ubuntu-advantage-esm-infra.gpg /etc/debproxy/keys/
  #   cp /usr/share/keyrings/ubuntu-advantage-esm-apps.gpg  /etc/debproxy/keys/
  #
  # esm.ubuntu.com serves all architectures directly (no ports split needed).
  # ESM infra covers the `main` component; ESM apps covers `universe`.
  # Both have separate -updates and -security suites.
  ubuntu-esm-infra-updates:
    url: https://esm.ubuntu.com/infra/ubuntu
    suite: "{codename}-infra-updates"
    username: bearer
    password: $UBUNTU_PRO_TOKEN
    keys:
      - /etc/debproxy/keys/ubuntu-advantage-esm-infra.gpg
    auto_update: true
  ubuntu-esm-infra-security:
    url: https://esm.ubuntu.com/infra/ubuntu
    suite: "{codename}-infra-security"
    username: bearer
    password: $UBUNTU_PRO_TOKEN
    keys:
      - /etc/debproxy/keys/ubuntu-advantage-esm-infra.gpg
    auto_update: true
  ubuntu-esm-apps-updates:
    url: https://esm.ubuntu.com/apps/ubuntu
    suite: "{codename}-apps-updates"
    username: bearer
    password: $UBUNTU_PRO_TOKEN
    keys:
      - /etc/debproxy/keys/ubuntu-advantage-esm-apps.gpg
    auto_update: true
  ubuntu-esm-apps-security:
    url: https://esm.ubuntu.com/apps/ubuntu
    suite: "{codename}-apps-security"
    username: bearer
    password: $UBUNTU_PRO_TOKEN
    keys:
      - /etc/debproxy/keys/ubuntu-advantage-esm-apps.gpg
    auto_update: true

layouts:
  # Debian: deb.debian.org serves all architectures, no split needed.
  - os: debian
    architectures: [amd64, arm64, i386]
    codenames:
      - codename: trixie
        components:
          - component: main
            upstreams: [debian-main, debian-security]
            # sources: true   # enable deb-src pull-through (apt-get source)
      - codename: bookworm
        components:
          - component: main
            upstreams: [debian-main, debian-security]

  # Ubuntu: layout lists all desired architectures; each upstream restricts
  # which architectures it fetches via its own `architectures:` field.
  # The x86 upstreams serve amd64/i386; the ports upstreams serve arm64.
  # arch-independent packages are fetched automatically from each upstream
  # that serves a binary-all/Packages file and merged into every arch index.
  #
  # ESM upstreams are added to main (infra) and universe (apps) for LTS
  # releases only. Remove them if you do not have an Ubuntu Pro subscription.
  - os: ubuntu
    architectures: [amd64, arm64, i386]
    codenames:
      - codename: noble
        components:
          - component: main
            upstreams:
              - ubuntu-main
              - ubuntu-updates
              - ubuntu-security
              - ubuntu-ports-main
              - ubuntu-ports-updates
              - ubuntu-ports-security
              - ubuntu-esm-infra-updates
              - ubuntu-esm-infra-security
              - ubuntu-esm-apps-updates
              - ubuntu-esm-apps-security
          - component: universe
            upstreams:
              - ubuntu-main
              - ubuntu-updates
              - ubuntu-security
              - ubuntu-ports-main
              - ubuntu-ports-updates
              - ubuntu-ports-security
          - component: restricted
            upstreams:
              - ubuntu-main
              - ubuntu-updates
              - ubuntu-security
              - ubuntu-ports-main
              - ubuntu-ports-updates
              - ubuntu-ports-security
          - component: multiverse
            upstreams:
              - ubuntu-main
              - ubuntu-updates
              - ubuntu-security
              - ubuntu-ports-main
              - ubuntu-ports-updates
              - ubuntu-ports-security
      - codename: jammy
        components:
          - component: main
            upstreams:
              - ubuntu-main
              - ubuntu-updates
              - ubuntu-security
              - ubuntu-ports-main
              - ubuntu-ports-updates
              - ubuntu-ports-security
              - ubuntu-esm-infra-updates
              - ubuntu-esm-infra-security
              - ubuntu-esm-apps-updates
              - ubuntu-esm-apps-security
          - component: universe
            upstreams:
              - ubuntu-main
              - ubuntu-updates
              - ubuntu-security
              - ubuntu-ports-main
              - ubuntu-ports-updates
              - ubuntu-ports-security
          - component: restricted
            upstreams:
              - ubuntu-main
              - ubuntu-updates
              - ubuntu-security
              - ubuntu-ports-main
              - ubuntu-ports-updates
              - ubuntu-ports-security
          - component: multiverse
            upstreams:
              - ubuntu-main
              - ubuntu-updates
              - ubuntu-security
              - ubuntu-ports-main
              - ubuntu-ports-updates
              - ubuntu-ports-security

# webhooks fire an HTTP POST whenever a new .deb is downloaded from upstream.
# Each hook renders its `body` template and POSTs to `url`. Values in `headers`
# starting with "$" are expanded from environment variables at startup.
# `upstreams` restricts firing to the named upstream(s); omit to fire for all.
#
# Template fields: .Package .Version .Arch .OS .Codename .Component .Section
#                  .Upstream .PoolPath .Size
#
# webhooks:
#
#   # --- Slack (Incoming Webhook) ---
#   - url: https://hooks.slack.com/services/T.../B.../XXXXXXXX
#     content_type: application/json
#     body: |
#       {
#         "blocks": [
#           {
#             "type": "section",
#             "text": {
#               "type": "mrkdwn",
#               "text": "*New package cached* `{{.Package}} {{.Version}}` ({{.OS}}/{{.Codename}}/{{.Component}}/{{.Arch}}) from upstream `{{.Upstream}}`"
#             }
#           }
#         ]
#       }
#
#   # --- Gotify ---
#   # Set GOTIFY_TOKEN to your Gotify application token.
#   - url: https://gotify.example.com/message
#     content_type: application/json
#     headers:
#       X-Gotify-Key: $GOTIFY_TOKEN
#     body: |
#       {
#         "title": "New package: {{.Package}} {{.Version}}",
#         "message": "{{.OS}}/{{.Codename}}/{{.Component}}/{{.Arch}} from {{.Upstream}} ({{.Size}} bytes)",
#         "priority": 3
#       }
#     # Only fire for auto-update upstreams, not pull-through:
#     upstreams: [ubuntu-updates, ubuntu-security, ubuntu-ports-updates, ubuntu-ports-security]
